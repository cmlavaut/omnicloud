  - name: Instalar paquetes 
    dnf:
      name:
       - dnf-plugins-core
      state: present

  - name: Docker repository
    command: 
        dnf config-manager --add-repo=https://download.docker.com/linux/centos/docker-ce.repo

  - name: Install Docker
    dnf:
      name:
        - docker-ce
        - docker-ce-cli
        - containerd.io
      state: latest

  - name: Start Docker service
    systemd:
       name: docker
       state: started
       enabled: yes

  - name: Add ec2-user to docker group
    user:
      name: ec2-user
      groups: docker
      append: yes